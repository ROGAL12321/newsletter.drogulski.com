<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Signup</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 32px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin-bottom: 24px;
      color: #555;
      line-height: 1.6;
    }

    .embed-area {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 20px;
      background: #fafafa;
    }

    .hint {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
    }

    code {
      background: #eee;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>Join my newsletter</h1>
      <p>
        Subscribe to get updates, new content, and occasional emails.
      </p>

      <div class="embed-area">
        <script id="mcjs">!function(c,h,i,m,p){m=c.createElement(h),p=c.getElementsByTagName(h)[0],m.async=1,m.src=i,p.parentNode.insertBefore(m,p)}(document,"script","https://chimpstatic.com/mcjs-connected/js/users/358d1024a52e3003dea0f511c/34f72a52f00b155a06bcf6f7a.js");</script>

      </div>

    </div>
  </div>
</body>
</html>
